version: '3.9'

services:
  backend:
    build: ./backend
    container_name: siem-backend
    ports:
      - "5000:5000"
    volumes:
      - siem-data:/app/data
    environment:
      - DB_PATH=/app/data/siem.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/status')"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build: ./frontend
    container_name: siem-frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:5000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  siem-data:
